apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service
  namespace: iicpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-service
  template:
    metadata:
      labels:
        app: telemetry-service
    spec:
      containers:
      - name: telemetry-service
        image: telemetry-service:latest
        imagePullPolicy: Never
        env:
        - name: REDIS_ADDR
          value: "redis:6379"
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"