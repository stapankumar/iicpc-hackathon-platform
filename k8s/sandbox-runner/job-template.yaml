# This is a TEMPLATE — submission-service generates real Jobs from this
apiVersion: batch/v1
kind: Job
metadata:
  name: sandbox-SUBMISSION_ID    # replaced dynamically
  namespace: iicpc
  labels:
    app: sandbox
    submission-id: SUBMISSION_ID
spec:
  ttlSecondsAfterFinished: 300   # auto-cleanup after 5 min
  backoffLimit: 0                # no retries — fair competition
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      restartPolicy: Never
      containers:
      - name: sandbox
        image: CONTESTANT_IMAGE  # replaced dynamically
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false