apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-isolation
  namespace: iicpc
spec:
  podSelector:
    matchLabels:
      app: sandbox
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: bot-fleet    # only bot-fleet can reach sandbox
    ports:
    - port: 8080
  egress: []                # sandbox cannot make outbound calls