apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iicpc-ingress
  namespace: iicpc
spec:
  ingressClassName: nginx
  rules:
  - host: iicpc.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leaderboard-service
            port:
              number: 8082
      - path: /submit
        pathType: Prefix
        backend:
          service:
            name: submission-service
            port:
              number: 8081
      - path: /scores
        pathType: Prefix
        backend:
          service:
            name: leaderboard-service
            port:
              number: 8082
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: leaderboard-service
            port:
              number: 8082