apiVersion: v1
kind: ServiceAccount
metadata:
  name: telemetry-service
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: telemetry-sandbox-cleanup
  namespace: {{ .Values.global.namespace }}
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["delete", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: telemetry-sandbox-cleanup
  namespace: {{ .Values.global.namespace }}
subjects:
- kind: ServiceAccount
  name: telemetry-service
  namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  apiVersion: rbac.authorization.k8s.io/v1
  name: telemetry-sandbox-cleanup
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.telemetryService.replicas }}
  selector:
    matchLabels:
      app: telemetry-service
  template:
    metadata:
      labels:
        app: telemetry-service
    spec:
      serviceAccountName: telemetry-service  # ADD THIS
      containers:
      - name: telemetry-service
        image: {{ .Values.telemetryService.image }}:{{ .Values.global.imageTag }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        env:
        - name: REDIS_ADDR
          value: "redis:{{ .Values.redis.port }}"
        - name: K8S_NAMESPACE
          value: {{ .Values.global.namespace }}  # ADD THIS
        resources:
          limits:
            cpu: {{ .Values.telemetryService.resources.limits.cpu }}
            memory: {{ .Values.telemetryService.resources.limits.memory }}
          requests:
            cpu: {{ .Values.telemetryService.resources.requests.cpu }}
            memory: {{ .Values.telemetryService.resources.requests.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: telemetry-service
  ports:
  - port: {{ .Values.telemetryService.port }}
    targetPort: {{ .Values.telemetryService.port }}
  type: ClusterIP