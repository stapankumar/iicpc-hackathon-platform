apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iicpc-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leaderboard-service
            port:
              number: {{ .Values.leaderboardService.port }}
      - path: /submit
        pathType: Prefix
        backend:
          service:
            name: submission-service
            port:
              number: {{ .Values.submissionService.port }}
      - path: /scores
        pathType: Prefix
        backend:
          service:
            name: leaderboard-service
            port:
              number: {{ .Values.leaderboardService.port }}
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: leaderboard-service
            port:
              number: {{ .Values.leaderboardService.port }}